<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Шахматы на JS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, 60px);
      grid-template-rows: repeat(8, 60px);
      gap: 0;
      border: 2px solid #333;
      user-select: none;
      margin-bottom: 20px;
    }
    .cell {
      width: 60px;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 36px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .white-cell {
      background-color: #eee;
    }
    .black-cell {
      background-color: #777;
      color: white;
    }
    #info {
      margin-bottom: 15px;
      font-size: 18px;
    }
    #timers {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
      font-weight: bold;
    }
    #log {
      width: 480px;
      height: 150px;
      overflow-y: auto;
      background: white;
      border: 1px solid #ccc;
      padding: 8px;
      list-style-type: none;
      font-size: 14px;
    }
    #log li {
      margin-bottom: 4px;
    }
    #reset-btn {
      margin-top: 10px;
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 4px;
      transition: background-color 0.3s;
    }
    #reset-btn:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <h1>Шахматы на JavaScript</h1>
  <div id="info">
    Ход сейчас: <span id="current-player">Белые</span>
  </div>
  <div id="timers">
    <div>Белые: <span id="white-timer">05:00</span></div>
    <div>Чёрные: <span id="black-timer">05:00</span></div>
  </div>
  <div id="board"></div>
  <button id="reset-btn">Новая игра</button>
  <h2>Лог ходов</h2>
  <ul id="log"></ul>

  <script src="chess.js"></script>
</body>
</html>
